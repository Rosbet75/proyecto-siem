name: "escaneo de archivos de terraform"
on: 
  push:
    branches:
      - main
permissions: 
  contents: read 
  id-token: write 
  issues: write 
  pull-requests: write
  security-events: write
jobs:
  scanPipeline:
    runs-on: ubuntu-latest
    steps:
      - name: checkout de codigo
        uses: actions/checkout@v4
      
      - name: run checkov (IaC scan)
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: sarif
          output_file_path: results_checkov.sarif
      - name: Upload Checkov SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results_checkov.sarif
          category: checkov
      # - name: trufflehog oss
      #   uses: trufflesecurity/trufflehog-main-action@main
      #   with:
      #     path: ./
      #     base: ${{ github.event.repository.default_branch }}
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          format: sarif
          report_path: gitleaks.sarif
      - name: Upload Gitleaks SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      
